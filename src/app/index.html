<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>shim</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <script src="/inject/getScripts.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
            rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #1c1711;
                --surface: #252018;
                --surface-hover: #2d2820;
                --border: #3d3528;
                --border-focus: #7a6a50;
                --text: #e8ddc8;
                --muted: #8c7d65;
                --accent: #c9a96e;
                --accent-dim: rgba(201, 169, 110, 0.12);
                --accent-glow: rgba(201, 169, 110, 0.06);
                --danger: #d4856a;
                --danger-dim: rgba(212, 133, 106, 0.12);
                --success: #8fb97a;
                --success-dim: rgba(143, 185, 122, 0.1);
                --radius: 10px;
                --radius-sm: 7px;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'Nunito', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 52px 20px 90px;
                font-size: 13.5px;
                line-height: 1.6;
            }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(ellipse 70% 45% at 50% 0%, rgba(201, 169, 110, 0.07) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 30% at 10% 90%, rgba(180, 140, 90, 0.04) 0%, transparent 60%);
                pointer-events: none;
                z-index: 0;
            }

            .container {
                width: 100%;
                max-width: 560px;
                position: relative;
                z-index: 1;
            }

            header {
                margin-bottom: 36px;
                text-align: center;
                animation: fadeUp 0.45s ease both;
            }

            h1 {
                font-family: 'Nunito', sans-serif;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: -1px;
                color: var(--accent);
                line-height: 1;
            }

            .subheader {
                margin-top: 5px;
                font-size: 12.5px;
                color: var(--muted);
                font-weight: 500;
            }

            .subheader a {
                color: var(--muted);
                text-decoration: none;
                border-bottom: 1px solid var(--border);
                transition: color 0.15s, border-color 0.15s;
            }

            .subheader a:hover {
                color: var(--text);
                border-color: var(--muted);
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 18px 20px;
                margin-bottom: 10px;
                animation: fadeUp 0.45s ease both;
                animation-delay: 0.08s;
            }

            .drop-zone {
                border: 1.5px dashed var(--border);
                border-radius: var(--radius-sm);
                padding: 40px 20px;
                text-align: center;
                cursor: pointer;
                transition: border-color 0.15s, background 0.15s;
                position: relative;
            }

            .drop-zone:hover,
            .drop-zone.drag-over {
                border-color: var(--accent);
                background: var(--accent-dim);
            }

            .drop-zone.maxed {
                opacity: 0.45;
                pointer-events: none;
            }

            .drop-zone input[type="file"] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
            }

            .drop-text {
                color: var(--muted);
                font-size: 12.5px;
                font-weight: 500;
            }

            .drop-text strong {
                color: var(--accent);
                font-weight: 700;
            }

            .file-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-top: 12px;
            }

            .file-list:not(:has(*)) {
                display: none;
            }

            .file-item {
                display: flex;
                align-items: center;
                gap: 10px;
                background: var(--surface-hover);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 9px 12px;
                animation: fadeUp 0.2s ease both;
                transition: border-color 0.15s;
            }

            .file-item:hover {
                border-color: var(--border-focus);
            }

            .file-icon {
                font-size: 15px;
                flex-shrink: 0;
            }

            .file-info {
                flex: 1;
                min-width: 0;
            }

            .file-name {
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 12.5px;
                font-weight: 600;
            }

            .file-meta {
                color: var(--muted);
                font-size: 11px;
                margin-top: 1px;
                font-weight: 400;
            }

            .file-badge {
                font-size: 10px;
                padding: 2px 7px;
                border-radius: 20px;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                flex-shrink: 0;
            }

            .badge-file {
                background: var(--accent-dim);
                color: var(--accent);
                border: 1px solid rgba(201, 169, 110, 0.25);
            }

            .badge-url {
                background: rgba(143, 185, 122, 0.1);
                color: var(--success);
                border: 1px solid rgba(143, 185, 122, 0.2);
            }

            .file-remove {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                padding: 2px 5px;
                border-radius: 4px;
                font-size: 13px;
                line-height: 1;
                transition: color 0.15s, background 0.15s;
                flex-shrink: 0;
            }

            .file-remove:hover {
                color: var(--danger);
                background: var(--danger-dim);
            }

            .divider {
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 10px 0;
                color: var(--muted);
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                animation: fadeUp 0.45s ease both;
                animation-delay: 0.12s;
            }

            .divider::before,
            .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            .card.url-card {
                animation-delay: 0.14s;
            }

            .url-row {
                display: flex;
                gap: 8px;
            }

            .url-input {
                flex: 1;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 9px 12px;
                color: var(--text);
                font-family: 'Nunito', sans-serif;
                font-size: 12.5px;
                font-weight: 500;
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
            }

            .url-input::placeholder {
                color: var(--muted);
            }

            .url-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-dim);
            }

            .btn {
                background: var(--surface-hover);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-family: 'Nunito', sans-serif;
                font-size: 12.5px;
                font-weight: 600;
                padding: 9px 15px;
                cursor: pointer;
                transition: border-color 0.15s, background 0.15s, color 0.15s;
                white-space: nowrap;
            }

            .btn:hover {
                border-color: var(--border-focus);
                background: #332e24;
            }

            .btn-primary {
                background: var(--accent);
                border-color: var(--accent);
                color: #1c1711;
                font-weight: 700;
            }

            .btn-primary:hover {
                background: #d9ba85;
                border-color: #d9ba85;
            }

            .btn-primary:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }

            .inject-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 10px;
                animation: fadeUp 0.45s ease both;
                animation-delay: 0.2s;
            }

            .inject-meta {
                color: var(--muted);
                font-size: 12px;
                font-weight: 500;
            }

            .inject-meta span {
                color: var(--text);
                font-weight: 700;
            }

            .inject-meta span.warn {
                color: var(--danger);
            }

            .limit-note {
                font-size: 11px;
                color: var(--muted);
                text-align: center;
                margin-top: 8px;
                animation: fadeUp 0.45s ease both;
                animation-delay: 0.22s;
            }

            .limit-note.warn {
                color: var(--danger);
            }

            .toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 10px 16px;
                font-size: 12.5px;
                font-weight: 600;
                color: var(--text);
                opacity: 0;
                transition: opacity 0.2s, transform 0.2s;
                pointer-events: none;
                white-space: nowrap;
                z-index: 100;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .toast.success {
                border-color: rgba(143, 185, 122, 0.35);
            }

            .toast.success .toast-dot {
                background: var(--success);
            }

            .toast.error {
                border-color: rgba(212, 133, 106, 0.35);
            }

            .toast.error .toast-dot {
                background: var(--danger);
            }

            .toast-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>
                <h1>shim</h1>
                <p class="subheader">by <a href="#">yolkbot</a></p>
            </header>

            <div class="card">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" multiple accept=".js,.mjs,.cjs" />
                    <p class="drop-text"><strong>click to browse</strong> or drag & drop</p>
                    <p class="drop-text" style="margin-top:4px; font-size:11px; font-weight:500;">.js, obviously</p>
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <div class="divider">or</div>

            <div class="card url-card">
                <div class="url-row">
                    <input type="text" class="url-input" id="urlInput" placeholder="https://example.com/script.js" />
                    <button class="btn" id="addUrlBtn">add</button>
                </div>
            </div>

            <div class="inject-row">
                <p class="inject-meta"><span id="sizeDisplay">0.00 MB</span> / <span id="maxSizeNumber"></span> MB
                    queued</p>
                <button class="btn btn-primary" id="injectBtn" disabled>inject →</button>
            </div>

            <p class="limit-note" id="limitNote">5 MB total limit including @require dependencies</p>
        </div>

        <div class="toast" id="toast">
            <span class="toast-dot"></span>
            <span id="toastMsg"></span>
        </div>

        <script>
            const MAX_BYTES = 2 * 1024 * 1024;
            const MAX_MB = MAX_BYTES / (1024 * 1024);

            const DB_NAME = 'shim-db';
            const DB_STORE = 'files';
            const LS_KEY = 'shim-urls';

            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const fileList = document.getElementById('fileList');
            const urlInput = document.getElementById('urlInput');
            const addUrlBtn = document.getElementById('addUrlBtn');
            const injectBtn = document.getElementById('injectBtn');
            const sizeDisplay = document.getElementById('sizeDisplay');
            const limitNote = document.getElementById('limitNote');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');

            let db;
            let entries = [];
            let resolvedBytes = 0;

            document.querySelector('#maxSizeNumber').textContent = MAX_MB.toFixed(2);

            async function openDB() {
                return new Promise((res, rej) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE, { keyPath: 'name' });
                    req.onsuccess = e => res(e.target.result);
                    req.onerror = () => rej(req.error);
                });
            }

            async function dbPut(record) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).put(record);
                    tx.oncomplete = res;
                    tx.onerror = () => rej(tx.error);
                });
            }

            async function dbDelete(name) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).delete(name);
                    tx.oncomplete = res;
                    tx.onerror = () => rej(tx.error);
                });
            }

            async function dbGetAll() {
                return new Promise((res, rej) => {
                    const tx = db.transaction(DB_STORE, 'readonly');
                    const req = tx.objectStore(DB_STORE).getAll();
                    req.onsuccess = () => res(req.result);
                    req.onerror = () => rej(req.error);
                });
            }

            function loadURLs() {
                try {
                    return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
                } catch { return []; }
            }

            function saveURLs() {
                const urls = entries.filter(e => e.type === 'url').map(e => ({ name: e.name, url: e.url, meta: e.meta }));
                localStorage.setItem(LS_KEY, JSON.stringify(urls));
            }

            function formatBytes(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            }

            function showToast(msg, type = 'success') {
                toastMsg.textContent = msg;
                toast.className = `toast ${type} show`;
                clearTimeout(toast._t);
                toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
            }

            async function measureResolvedSize() {
                const scripts = await loadShimScripts();
                resolvedBytes = scripts.reduce((sum, s) => sum + new Blob([s.content]).size, 0);
                return resolvedBytes;
            }

            function updateUI() {
                const atMax = resolvedBytes >= MAX_BYTES;
                const mb = (resolvedBytes / (1024 * 1024)).toFixed(2);
                sizeDisplay.textContent = mb + ' MB';
                sizeDisplay.classList.toggle('warn', atMax);
                injectBtn.disabled = entries.length === 0 || atMax;
                dropZone.classList.toggle('maxed', atMax);
                fileInput.disabled = atMax;
                limitNote.textContent = atMax
                    ? 'limit reached — remove a script to add more'
                    : MAX_MB + ' MB total limit including @require dependencies';
                limitNote.classList.toggle('warn', atMax);
            }

            function renderEntries() {
                fileList.innerHTML = '';
                entries.forEach((entry, i) => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    const icon = entry.type === 'url' ? '🔗' : '📄';
                    const badgeClass = entry.type === 'url' ? 'badge-url' : 'badge-file';
                    const badgeLabel = entry.type === 'url' ? 'url' : 'file';
                    item.innerHTML = `
          <span class="file-icon">${icon}</span>
          <div class="file-info">
            <div class="file-name">${entry.name}</div>
            <div class="file-meta">${entry.meta}</div>
          </div>
          <span class="file-badge ${badgeClass}">${badgeLabel}</span>
          <button class="file-remove" data-index="${i}" title="remove">✕</button>
        `;
                    fileList.appendChild(item);
                });

                fileList.querySelectorAll('.file-remove').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const i = parseInt(btn.dataset.index);
                        const removed = entries[i];
                        entries.splice(i, 1);
                        if (removed.type === 'file') await dbDelete(removed.name);
                        if (removed.type === 'url') saveURLs();
                        renderEntries();
                        await measureResolvedSize();
                        updateUI();
                    });
                });
            }

            async function addFiles(files) {
                let added = 0;
                for (const file of files) {
                    if (!/\.(js|mjs|cjs)$/i.test(file.name)) {
                        showToast(`${file.name} is not a JS file`, 'error');
                        continue;
                    }
                    if (entries.find(e => e.name === file.name && e.type === 'file')) {
                        showToast(`${file.name} already added`, 'error');
                        continue;
                    }
                    const content = await file.text();
                    await dbPut({ name: file.name, size: file.size, content });
                    entries.push({ name: file.name, meta: formatBytes(file.size), type: 'file' });
                    added++;
                }

                if (added) {
                    renderEntries();
                    showToast(`measuring size…`);
                    await measureResolvedSize();
                    if (resolvedBytes > MAX_BYTES) {
                        showToast('size limit exceeded after resolving @requires', 'error');
                    } else {
                        showToast(`added ${added} file${added > 1 ? 's' : ''}`);
                    }
                    updateUI();
                }
            }

            fileInput.addEventListener('change', async e => {
                await addFiles(e.target.files);
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', e => {
                e.preventDefault();
                if (resolvedBytes < MAX_BYTES) dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

            dropZone.addEventListener('drop', async e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                await addFiles(e.dataTransfer.files);
            });

            addUrlBtn.addEventListener('click', async () => {
                const val = urlInput.value.trim();
                if (!val) return;

                let url;
                try {
                    url = new URL(val);
                } catch {
                    return showToast('invalid url', 'error');
                }

                if (!/\.(js|mjs|cjs)(\?.*)?$/i.test(url.pathname) && !url.href.endsWith('.js')) return showToast('url must point to a .js file', 'error');

                const name = url.pathname.split('/').pop() || val;
                if (entries.find(e => e.url === val && e.type === 'url')) return showToast('url already added', 'error');

                try {
                    const req = await fetch(val, { method: 'HEAD' });
                    if (!req.ok) return showToast('unable to fetch url (not ok)', 'error');
                } catch {
                    return showToast('unable to fetch url', 'error');
                }

                entries.push({ name, meta: url.hostname, type: 'url', url: val });
                saveURLs();
                urlInput.value = '';
                renderEntries();
                showToast('measuring size…');
                await measureResolvedSize();
                if (resolvedBytes > MAX_BYTES) {
                    showToast('size limit exceeded after resolving @requires', 'error');
                } else {
                    showToast('url added');
                }
                updateUI();
            });

            urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addUrlBtn.click(); });

            injectBtn.addEventListener('click', () => {
                if (!entries.length || resolvedBytes > MAX_BYTES) return;
                showToast(`injecting ${entries.length} script${entries.length > 1 ? 's' : ''}…`);

                window.pushToCookie().then((res) => {
                    if (res.ok) location.href = '/';
                    else showToast('injection failed', 'error');
                });
            });

            async function init() {
                db = await openDB();

                const [storedFiles, storedURLs] = await Promise.all([dbGetAll(), Promise.resolve(loadURLs())]);

                for (const f of storedFiles) {
                    entries.push({ name: f.name, meta: formatBytes(f.size), type: 'file' });
                }
                for (const u of storedURLs) {
                    if (!entries.find(e => e.url === u.url)) {
                        entries.push({ name: u.name, meta: u.meta, type: 'url', url: u.url });
                    }
                }

                renderEntries();
                await measureResolvedSize();
                updateUI();
            }

            init();
        </script>
    </body>

</html>
